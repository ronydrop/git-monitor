<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Git Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --green: #3fb950;
    --green-bg: rgba(63, 185, 80, 0.1);
    --yellow: #d29922;
    --yellow-bg: rgba(210, 153, 34, 0.1);
    --orange: #db6d28;
    --orange-bg: rgba(219, 109, 40, 0.1);
    --red: #f85149;
    --red-bg: rgba(248, 81, 73, 0.1);
    --blue: #58a6ff;
    --blue-bg: rgba(88, 166, 255, 0.1);
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: transparent;
    color: var(--text);
    font-size: 11px;
    overflow: hidden;
    user-select: none;
  }

  .container {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---- Update banner ---- */
  .update-banner {
    display: none;
    padding: 6px 12px;
    background: var(--blue-bg);
    border-bottom: 1px solid var(--blue);
    font-size: 9.5px;
    color: var(--blue);
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .update-banner.show { display: flex; }
  .update-banner button {
    padding: 2px 8px;
    border: 1px solid var(--blue);
    border-radius: 4px;
    background: transparent;
    color: var(--blue);
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .update-banner button:hover { background: var(--blue); color: var(--bg); }

  /* ---- Title bar ---- */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    cursor: grab;
  }

  .titlebar-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .titlebar-icon {
    width: 14px;
    height: 14px;
    fill: var(--green);
  }

  .titlebar h1 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .titlebar-actions {
    display: flex;
    gap: 4px;
    -webkit-app-region: no-drag;
  }

  .titlebar-actions button {
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .titlebar-actions button:hover {
    background: var(--bg-hover);
    color: var(--text);
  }

  .btn-close:hover { background: var(--red-bg) !important; color: var(--red) !important; }

  /* ---- Status bar ---- */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
  }

  .status-bar .interval-ctrl {
    display: flex;
    align-items: center;
    gap: 4px;
    -webkit-app-region: no-drag;
  }

  .status-bar select {
    background: var(--bg-card);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    font-family: inherit;
    padding: 1px 4px;
    cursor: pointer;
  }

  /* ---- Repo list ---- */
  .repo-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ---- Resize handle ---- */
  .resize-handle {
    height: 6px;
    background: transparent;
    cursor: ns-resize;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .resize-handle:hover, .resize-handle.dragging {
    background: var(--border);
  }
  .resize-handle::after {
    content: '';
    width: 30px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.15s;
  }
  .resize-handle:hover::after, .resize-handle.dragging::after {
    background: var(--text-dim);
  }

  .repo-list::-webkit-scrollbar { width: 4px; }
  .repo-list::-webkit-scrollbar-track { background: transparent; }
  .repo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .repo-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    gap: 8px;
  }

  .repo-item:last-child { border-bottom: none; }
  .repo-item:hover { background: var(--bg-hover); }

  /* ---- Repo checkbox ---- */
  .repo-check {
    appearance: none;
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
  }
  .repo-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .repo-check:checked::after {
    content: '✓';
    position: absolute;
    top: -1px;
    left: 1px;
    font-size: 9px;
    color: #0d1117;
    font-weight: 700;
  }
  .repo-check:hover { border-color: var(--green); }

  .repo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .repo-dot.clean { background: var(--green); animation: none; }
  .repo-dot.dirty { background: var(--yellow); }
  .repo-dot.dirty-ahead { background: var(--orange); }
  .repo-dot.ahead { background: var(--blue); animation: none; }
  .repo-dot.behind { background: var(--blue); }
  .repo-dot.error { background: var(--red); animation: none; }
  .repo-dot.busy { background: var(--yellow); opacity: 0.5; animation: none; }

  .repo-info { flex: 1; min-width: 0; }

  .repo-name {
    font-weight: 600;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .repo-detail {
    font-size: 9.5px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .repo-badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-clean { background: var(--green-bg); color: var(--green); }
  .badge-dirty { background: var(--yellow-bg); color: var(--yellow); }
  .badge-dirty-ahead { background: var(--orange-bg); color: var(--orange); }
  .badge-ahead { background: var(--blue-bg); color: var(--blue); }
  .badge-behind { background: var(--blue-bg); color: var(--blue); }
  .badge-error { background: var(--red-bg); color: var(--red); }
  .badge-diverged { background: var(--red-bg); color: var(--red); }
  .repo-dot.diverged { background: var(--red); }

  /* ---- Deploy indicator ---- */
  .deploy-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 0 0 4px 4px;
    transition: background 0.3s;
    animation: deploy-pulse 1.2s ease-in-out infinite;
  }
  .deploy-bar.waiting  { background: var(--text-dim); }
  .deploy-bar.running  { background: var(--yellow); }
  .deploy-bar.success  { background: var(--green); animation: none; }
  .deploy-bar.failure  { background: var(--red); animation: none; }

  @keyframes deploy-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .repo-item { position: relative; }

  .deploy-label {
    font-size: 8.5px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .deploy-label.running { color: var(--yellow); }
  .deploy-label.success { color: var(--green); }
  .deploy-label.failure { color: var(--red); }

  /* ---- Push All button ---- */
  .btn-push-all {
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 9px;
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-push-all:hover { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .btn-push-all span { display: inline-block; }
  .btn-push-all.running { color: var(--yellow); border-color: var(--yellow); pointer-events: none; }
  .btn-push-all.running span { animation: spin 0.8s linear infinite; }
  .btn-push-all.done { color: var(--green); border-color: var(--green); background: var(--green-bg); pointer-events: none; }

  /* ---- Repo action buttons ---- */
  .repo-actions {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }

  .btn-repo-action {
    width: 20px;
    height: 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    padding: 0;
  }
  .btn-repo-action:hover { background: var(--bg-hover); color: var(--text); border-color: #3d444d; }

  /* ---- Commit button ---- */
  .btn-commit {
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    padding: 0;
  }
  .btn-commit:hover { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .btn-commit.loading  { color: var(--yellow); border-color: var(--yellow); pointer-events: none; }
  .btn-commit.loading span { animation: spin 0.8s linear infinite; }
  .btn-commit.deploying { color: var(--blue); border-color: var(--blue); background: var(--blue-bg); pointer-events: none; }
  .btn-commit.deploying span { animation: spin 1.2s linear infinite; }
  .btn-commit.deployed  { color: var(--green); border-color: var(--green); background: var(--green-bg); pointer-events: none; }
  .btn-commit.deploy-fail { color: var(--red); border-color: var(--red); background: var(--red-bg); pointer-events: none; }
  .btn-commit.fail     { color: var(--red);   border-color: var(--red);   background: var(--red-bg);   }

  .btn-pull {
    width: 22px;
    height: 22px;
    border: 1px solid var(--blue);
    border-radius: 5px;
    background: var(--blue-bg);
    color: var(--blue);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    padding: 0;
  }
  .btn-pull span { display: inline-block; }
  .btn-pull:hover { background: var(--blue); color: var(--bg); }
  .btn-pull.loading { pointer-events: none; }
  .btn-pull.loading span { animation: spin 0.8s linear infinite; }
  .btn-pull.done { color: var(--green); border-color: var(--green); background: var(--green-bg); pointer-events: none; }
  .btn-pull.fail { color: var(--red); border-color: var(--red); background: var(--red-bg); }

/* ---- Empty state ---- */
  .empty-state {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
  .empty-state p { font-size: 10px; line-height: 1.5; }

  .btn-config {
    margin-top: 10px;
    padding: 5px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-config:hover { background: var(--bg-hover); border-color: var(--blue); }


  /* ---- Controls bar ---- */
  .controls-bar {
    display: flex;
    align-items: center;
    padding: 5px 8px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    gap: 4px;
    -webkit-app-region: no-drag;
    flex-wrap: wrap;
  }

  .btn-lock {
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-lock:hover { background: var(--bg-hover); }
  .btn-lock.locked { color: var(--orange); border-color: var(--orange); background: var(--orange-bg); }

  .opacity-ctrl {
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
  }

  input[type="range"].opacity-slider {
    flex: 1;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"].opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--blue);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type="range"].opacity-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .opacity-val {
    font-size: 8px;
    color: var(--text-dim);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  .ctrl-sep {
    width: 1px;
    height: 14px;
    background: var(--border);
    flex-shrink: 0;
  }

  .corner-btns {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .btn-corner {
    width: 18px;
    height: 18px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .btn-corner:hover { background: var(--bg-hover); color: var(--blue); border-color: var(--blue); }
  .btn-corner:active { transform: scale(0.9); }

  .btn-zone {
    height: 18px;
    padding: 0 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 9px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-zone:hover { background: var(--bg-hover); color: var(--text); border-color: #3d444d; }
  .btn-zone.active { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  /* ---- Refresh animation ---- */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .btn-refresh {
    transition: background 0.15s, color 0.15s !important;
  }
  .btn-refresh span {
    display: inline-block;
  }
  .btn-refresh.spinning span {
    animation: spin 0.6s linear infinite;
  }

  .icon-spin { animation: spin 1s linear infinite; transform-origin: center; transform-box: fill-box; }
  button svg, .hdr-btn svg { display: inline-block; vertical-align: middle; }

  /* ---- Collapsed ---- */
  .container.collapsed .repo-list,
  .container.collapsed .status-bar,
  .container.collapsed .controls-bar,
  .container.collapsed .resize-handle,
  .container.collapsed .credits {
    display: none;
  }

  #pendingToggleBtn { display: none; }
  .container.collapsed #pendingToggleBtn { display: flex; }

  .pending-preview {
    display: none;
    padding: 2px 6px 6px;
    border-top: 1px solid var(--border);
  }
  .container.collapsed.pending-visible .pending-preview {
    display: block;
  }
  .pending-preview .repo-item {
    padding: 4px 6px;
    gap: 6px;
    min-height: 26px;
  }
  .pending-preview .repo-item .repo-name { font-size: 11px; }
  .pending-preview .repo-item .repo-detail { font-size: 10px; }
  .pending-preview .empty-pending {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 6px;
    opacity: 0.6;
  }

  /* ---- Loading shimmer ---- */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    height: 36px;
    margin: 4px 12px;
    border-radius: 6px;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>

<div class="container" id="container">
  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-left">
      <svg class="titlebar-icon" viewBox="0 0 16 16">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <h1>Git Monitor</h1>
    </div>
    <div class="titlebar-actions">
      <button class="btn-refresh" id="refreshBtn" onclick="refreshNow()" title="Atualizar"></button>
      <button id="configBtn" onclick="openConfig()" title="Configurar"></button>
      <button id="pendingToggleBtn" onclick="togglePending()" title="Mostrar pendentes"></button>
      <button id="modeBtn" onclick="switchMode()" title="Mudar para modo notch"></button>
      <button id="collapseBtn" onclick="toggleCollapse()" title="Minimizar"></button>
      <button class="btn-close" id="closeBtn" onclick="closeApp()" title="Fechar"></button>
    </div>
  </div>

  <!-- Pending preview (collapsed mode) -->
  <div class="pending-preview" id="pendingPreview"></div>

  <!-- Update banner -->
  <div class="update-banner" id="updateBanner">
    <span id="updateMsg">Nova versão disponível!</span>
    <button id="updateBtn" onclick="installUpdate()">Instalar</button>
  </div>

  <!-- Controls bar -->
  <div class="controls-bar">
    <button class="btn-lock" id="lockBtn" onclick="toggleLock()" title="Travar posição"></button>
    <div class="opacity-ctrl">
      <input type="range" class="opacity-slider" id="opacitySlider" min="15" max="100" value="100" oninput="changeOpacity(this.value)" title="Opacidade" />
      <span class="opacity-val" id="opacityVal">100%</span>
    </div>
    <div class="ctrl-sep"></div>
    <div class="corner-btns">
      <button class="btn-corner" id="cornerTL" onclick="snapCorner('tl')" title="Canto superior esquerdo"></button>
      <button class="btn-corner" id="cornerTR" onclick="snapCorner('tr')" title="Canto superior direito"></button>
      <button class="btn-corner" id="cornerBL" onclick="snapCorner('bl')" title="Canto inferior esquerdo"></button>
      <button class="btn-corner" id="cornerBR" onclick="snapCorner('br')" title="Canto inferior direito"></button>
    </div>
    <div class="ctrl-sep"></div>
    <button class="btn-zone" id="zoneBtn" onclick="toggleZone()" title="Definir zona de detecção ghost"></button>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="lastCheck">Verificando...</span>
    <div style="display:flex; align-items:center; gap:6px;">
      <button class="btn-push-all" id="pushAllBtn" onclick="pushAll()" title="Commit + Push todos os repos modificados"></button>
      <div class="interval-ctrl">
        <span id="timerIcon"></span>
        <select id="intervalSelect" onchange="changeInterval(this.value)">
          <option value="10">10s</option>
          <option value="30" selected>30s</option>
          <option value="60">1min</option>
          <option value="120">2min</option>
          <option value="300">5min</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Repo list -->
  <div class="repo-list" id="repoList">
    <div class="loading-shimmer"></div>
    <div class="loading-shimmer"></div>
    <div class="loading-shimmer"></div>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Credits -->
  <div style="text-align:center; padding: 3px 0 4px; font-size: 8px; color: var(--text-dim); letter-spacing: 0.3px; flex-shrink:0; -webkit-app-region: no-drag;">
    by <a href="#" onclick="ipcRenderer.invoke('open-git-url','https://github.com/ronydrop')" style="color:var(--text-dim); text-decoration:none;">@rony_drop</a>
  </div>
</div>


<script>
  const { ipcRenderer } = require('electron');

  const ICONS = {
    'refresh-cw':   '<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>',
    'settings':     '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
    'minus':        '<path d="M5 12h14"/>',
    'x':            '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    'check':        '<path d="M20 6 9 17l-5-5"/>',
    'alert':        '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    'lock':         '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
    'unlock':       '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>',
    'ghost':        '<path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>',
    'arrow-up':     '<path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>',
    'arrow-down':   '<path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>',
    'arrow-ul':     '<path d="M17 17 7 7"/><path d="M7 17V7h10"/>',
    'arrow-ur':     '<path d="M7 17 17 7"/><path d="M7 7h10v10"/>',
    'arrow-dl':     '<path d="M17 7 7 17"/><path d="M17 17H7V7"/>',
    'arrow-dr':     '<path d="m7 7 10 10"/><path d="M17 7v10H7"/>',
    'folder':       '<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
    'folder-open':  '<path d="M6 14 4 20h16l-2-6"/><path d="M2 14V6a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v5"/>',
    'terminal':     '<path d="m4 17 6-6-6-6"/><path d="M12 19h8"/>',
    'chevron-up':   '<path d="m18 15-6-6-6 6"/>',
    'chevron-down': '<path d="m6 9 6 6 6-6"/>',
    'chevron-right':'<path d="m9 18 6-6-6-6"/>',
    'timer':        '<path d="M10 2h4"/><path d="M12 14v-4"/><circle cx="12" cy="14" r="8"/>',
    'hourglass':    '<path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>',
    'zap':          '<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>',
    'eye':          '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
    'eye-off':      '<path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/>',
    'app-window':   '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/>',
    'grip':         '<circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>',
  };

  const _svgParser = new DOMParser();

  function icon(name, opts) {
    opts = opts || {};
    const size = opts.size || 16;
    const cls = opts.spin ? ' class="icon-spin"' : '';
    const xml = '<svg xmlns="http://www.w3.org/2000/svg"' + cls + ' width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + ICONS[name] + '</svg>';
    return _svgParser.parseFromString(xml, 'image/svg+xml').documentElement;
  }

  function setIcon(target, name, opts) {
    target.replaceChildren(icon(name, opts));
  }

  function setIconLabel(target, name, text, opts) {
    target.replaceChildren(icon(name, opts), document.createTextNode('\u00A0' + text));
  }

  let intervalId = null;
  let config = {};
  let lastResults = [];

  const BADGE_LABELS = {
    'clean': 'OK',
    'dirty': 'MODIFIED',
    'dirty-ahead': 'MOD+PUSH',
    'ahead': 'PUSH',
    'behind': 'PULL',
    'diverged': 'DIVERGIDO',
    'error': 'ERRO',
    'busy': '...'
  };

  // ---- Render repos ----
  function renderRepos(results) {
    const list = document.getElementById('repoList');
    list.replaceChildren();

    if (!results || results.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-state';
      const iconDiv = document.createElement('div');
      iconDiv.className = 'icon';
      iconDiv.appendChild(icon('folder-open', { size: 28 }));
      const p = document.createElement('p');
      p.appendChild(document.createTextNode('Nenhum repositório configurado.\u00A0Clique em\u00A0'));
      p.appendChild(icon('settings', { size: 12 }));
      p.appendChild(document.createTextNode('\u00A0para adicionar.'));
      const btn = document.createElement('button');
      btn.className = 'btn-config';
      btn.textContent = 'Configurar Repos';
      btn.onclick = openConfig;
      emptyDiv.appendChild(iconDiv);
      emptyDiv.appendChild(p);
      emptyDiv.appendChild(btn);
      list.appendChild(emptyDiv);
      return;
    }

    results.forEach(r => {
      const hasChanges = r.status === 'dirty' || r.status === 'dirty-ahead' || r.status === 'ahead';
      const needsPull  = r.status === 'behind';
      const esc = s => (s || '').replace(/'/g, "\\'");

      const item = document.createElement('div');
      item.className = 'repo-item';
      item.dataset.repoPath = r.path || '';
      item.title = (r.path || '') + '\n' + (r.detail || '');

      if (hasChanges) {
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'repo-check';
        cb.dataset.path = r.path || '';
        cb.dataset.name = r.name || '';
        cb.checked = true;
        cb.title = 'Incluir no Push All';
        item.appendChild(cb);
      }

      const dot = document.createElement('div');
      dot.className = 'repo-dot ' + (r.status || 'clean');
      item.appendChild(dot);

      const info = document.createElement('div');
      info.className = 'repo-info';
      const nameEl = document.createElement('div');
      nameEl.className = 'repo-name';
      nameEl.textContent = r.name || '';
      const detailEl = document.createElement('div');
      detailEl.className = 'repo-detail';
      detailEl.textContent = (r.branch ? r.branch + ' \u00B7 ' : '') + (r.detail || '');
      const repoDeployId = deployId(r.path);
      const deployLabel = document.createElement('div');
      deployLabel.className = 'deploy-label';
      deployLabel.id = 'deploy-label-' + repoDeployId;
      info.appendChild(nameEl);
      info.appendChild(detailEl);
      info.appendChild(deployLabel);
      item.appendChild(info);

      const badge = document.createElement('span');
      badge.className = 'repo-badge badge-' + (r.status || 'clean');
      badge.textContent = BADGE_LABELS[r.status] || '?';
      item.appendChild(badge);

      const actions = document.createElement('div');
      actions.className = 'repo-actions';

      if (r.remoteUrl) {
        const gitBtn = document.createElement('button');
        gitBtn.className = 'btn-repo-action';
        gitBtn.title = 'Abrir no GitHub';
        gitBtn.style.cssText = 'padding:0;display:flex;align-items:center;justify-content:center;';
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 16 16');
        svg.setAttribute('width', '12');
        svg.setAttribute('height', '12');
        svg.setAttribute('fill', 'currentColor');
        const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p2.setAttribute('d', 'M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z');
        svg.appendChild(p2);
        gitBtn.appendChild(svg);
        gitBtn.onclick = () => openGitUrl(r.remoteUrl);
        actions.appendChild(gitBtn);
      }

      const termBtn = document.createElement('button');
      termBtn.className = 'btn-repo-action';
      termBtn.title = 'Abrir terminal';
      termBtn.appendChild(icon('terminal', { size: 12 }));
      termBtn.onclick = () => openTerminal(r.path, r.name);
      actions.appendChild(termBtn);

      if (hasChanges) {
        const commitBtn = document.createElement('button');
        commitBtn.className = 'btn-commit';
        commitBtn.title = 'Commit + Push com IA';
        commitBtn.appendChild(icon('arrow-up', { size: 13 }));
        commitBtn.onclick = function() { doCommit(this, r.path, r.name); };
        actions.appendChild(commitBtn);
      } else if (needsPull) {
        const pullBtn = document.createElement('button');
        pullBtn.className = 'btn-pull';
        pullBtn.title = 'Git Pull';
        pullBtn.appendChild(icon('arrow-down', { size: 13 }));
        pullBtn.onclick = function() { doPull(this, r.path, r.name); };
        actions.appendChild(pullBtn);
      }

      item.appendChild(actions);

      const deployBar = document.createElement('div');
      deployBar.className = 'deploy-bar';
      deployBar.id = 'deploy-bar-' + repoDeployId;
      deployBar.style.display = 'none';
      item.appendChild(deployBar);

      list.appendChild(item);
    });
  }

  // ---- Check repos ----
  async function checkRepos() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    const results = await ipcRenderer.invoke('check-repos');
    lastResults = results || [];
    renderRepos(results);
    if (document.getElementById('container').classList.contains('pending-visible')) renderPendingPreview();
    document.getElementById('lastCheck').textContent = `Último: ${new Date().toLocaleTimeString('pt-BR')}`;
    setTimeout(() => btn.classList.remove('spinning'), 600);
  }

  function refreshNow() {
    checkRepos();
  }

  // ---- Interval ----
  function startInterval(seconds) {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(checkRepos, seconds * 1000);
  }

  function changeInterval(val) {
    const seconds = parseInt(val);
    startInterval(seconds);
    ipcRenderer.invoke('set-interval', seconds);
  }

  // ---- Collapse ----
  async function toggleCollapse() {
    const collapsed = await ipcRenderer.invoke('minimize-app');
    document.getElementById('container').classList.toggle('collapsed', collapsed);
    const btn = document.getElementById('collapseBtn');
    setIcon(btn, collapsed ? 'chevron-down' : 'chevron-up');
    btn.title = collapsed ? 'Expandir' : 'Minimizar';
  }

  // ---- Pending preview (collapsed mode) ----
  function togglePending() {
    const container = document.getElementById('container');
    const visible = container.classList.toggle('pending-visible');
    const btn = document.getElementById('pendingToggleBtn');
    setIcon(btn, visible ? 'eye-off' : 'eye');
    btn.title = visible ? 'Ocultar pendentes' : 'Mostrar pendentes';
    if (visible) renderPendingPreview();
  }

  function renderPendingPreview() {
    const preview = document.getElementById('pendingPreview');
    preview.replaceChildren();
    const PENDING = ['dirty', 'dirty-ahead', 'ahead', 'behind', 'diverged'];
    const pending = lastResults.filter(r => PENDING.includes(r.status));
    if (pending.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-pending';
      empty.textContent = 'Nenhum pendente';
      preview.appendChild(empty);
      return;
    }
    pending.forEach(r => {
      const item = document.createElement('div');
      item.className = 'repo-item';

      const dot = document.createElement('div');
      dot.className = 'repo-dot ' + (r.status || 'clean');
      item.appendChild(dot);

      const info = document.createElement('div');
      info.className = 'repo-info';
      const nameEl = document.createElement('div');
      nameEl.className = 'repo-name';
      nameEl.textContent = r.name || '';
      const detailEl = document.createElement('div');
      detailEl.className = 'repo-detail';
      detailEl.textContent = (r.branch ? r.branch + ' · ' : '') + (r.detail || '');
      info.appendChild(nameEl);
      info.appendChild(detailEl);
      item.appendChild(info);

      if (r.remoteUrl) {
        const actions = document.createElement('div');
        actions.className = 'repo-actions';
        const gitBtn = document.createElement('button');
        gitBtn.className = 'btn-repo-action';
        gitBtn.title = 'Abrir no GitHub';
        gitBtn.style.cssText = 'padding:0;display:flex;align-items:center;justify-content:center;';
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 16 16');
        svg.setAttribute('width', '12');
        svg.setAttribute('height', '12');
        svg.setAttribute('fill', 'currentColor');
        const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p2.setAttribute('d', 'M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z');
        svg.appendChild(p2);
        gitBtn.appendChild(svg);
        gitBtn.onclick = () => openGitUrl(r.remoteUrl);
        actions.appendChild(gitBtn);
        item.appendChild(actions);
      }

      preview.appendChild(item);
    });
  }

  // ---- Mode switch ----
  async function switchMode() {
    await ipcRenderer.invoke('set-widget-mode', 'notch');
  }

  // ---- Close ----
  function closeApp() {
    ipcRenderer.invoke('close-app');
  }

  // ---- Push All ----
  async function pushAll() {
    // Pega apenas os repos com checkbox marcado
    const checked = [...document.querySelectorAll('.repo-check:checked')].map(el => ({
      path: el.dataset.path,
      name: el.dataset.name
    }));

    if (checked.length === 0) {
      showCommitToast('err', 'Nenhum repo selecionado para push');
      return;
    }

    const modified = checked;

    const btn = document.getElementById('pushAllBtn');
    btn.className = 'btn-push-all running';
    setIconLabel(btn, 'refresh-cw', '0/' + modified.length, { spin: true });

    let doneCount = 0;
    const results2 = await Promise.all(modified.map((r, i) =>
      new Promise(resolve => setTimeout(async () => {
        const res = await ipcRenderer.invoke('commit-and-push', r.path);
        doneCount++;
        setIconLabel(btn, 'refresh-cw', doneCount + '/' + modified.length, { spin: true });
        resolve(res);
      }, i * 120))
    ));

    const ok = results2.filter(r => r.ok);
    const fail = results2.filter(r => !r.ok);

    btn.className = 'btn-push-all done';
    setIconLabel(btn, 'check', ok.length + '/' + modified.length);

    if (fail.length > 0) {
      showCommitToast('err', fail.length + ' falharam: ' + fail.map(r => r.error).join('; ').substring(0, 120));
    } else {
      showCommitToast('ok', ok.length + ' repos commitados e pushed!');
    }

    setTimeout(() => {
      btn.className = 'btn-push-all';
      setIconLabel(btn, 'arrow-up', 'Push All');
      checkRepos();
    }, 4000);
  }

  // ---- Config window ----
  function openConfig() {
    ipcRenderer.invoke('open-config-window');
  }

  // ---- Repo shortcuts ----
  function openGitUrl(url) {
    ipcRenderer.invoke('open-git-url', url);
  }

  async function doPull(btn, repoPath, repoName) {
    btn.className = 'btn-pull loading';
    setIcon(btn, 'refresh-cw', { spin: true });

    let result;
    try {
      const timeoutP = new Promise((_, rej) =>
        setTimeout(() => rej(new Error('Pull travou (>110s) — abortado')), 110000));
      result = await Promise.race([
        ipcRenderer.invoke('git-pull', repoPath),
        timeoutP
      ]);
    } catch (e) {
      result = { ok: false, error: e.message || String(e) };
    }

    if (result && result.ok) {
      btn.className = 'btn-pull done';
      setIcon(btn, 'check');
      btn.removeAttribute('title');
      showCommitToast('ok', repoName + ': Pull concluído!');
      setTimeout(() => checkRepos(), 2000);
    } else {
      btn.className = 'btn-pull fail';
      setIcon(btn, 'x');
      btn.setAttribute('title', (result && result.error) || 'Erro desconhecido');
      showCommitToast('err', repoName + ': ' + ((result && result.error) || 'erro'));
      setTimeout(() => {
        btn.className = 'btn-pull';
        setIcon(btn, 'arrow-down');
        btn.removeAttribute('title');
      }, 4000);
    }
  }

  function openTerminal(repoPath, name) {
    ipcRenderer.invoke('open-terminal', repoPath, name);
  }

  // ---- Commit with AI ----
  async function doCommit(btn, repoPath, repoName) {
    btn.className = 'btn-commit loading';
    setIcon(btn, 'refresh-cw', { spin: true });

    const result = await ipcRenderer.invoke('commit-and-push', repoPath);

    if (result.ok) {
      showCommitToast('ok', repoName + '\n' + (result.title || ''));
      btn.className = 'btn-commit deploying';
      setIcon(btn, 'refresh-cw', { spin: true });
      startDeployWatch(btn, repoPath, repoName);
    } else {
      btn.className = 'btn-commit fail';
      setIcon(btn, 'x');
      showCommitToast('err', repoName + ': ' + (result.error || ''));
      setTimeout(() => { btn.className = 'btn-commit'; setIcon(btn, 'arrow-up'); }, 4000);
    }
  }

  // Mapa de commits em andamento: repoPath → btn element
  const activeDeployBtns = {};

  function deployId(repoPath) {
    return encodeURIComponent(repoPath || '').replace(/[^a-zA-Z0-9]/g, '_');
  }

  function startDeployWatch(btn, repoPath, repoName) {
    activeDeployBtns[repoPath] = { btn, repoName };
    ipcRenderer.send('watch-deploy-start', { repoPath, repoName });
  }

  // Recebe updates em tempo real do main process
  ipcRenderer.on('deploy-update', (_, data) => {
    const { repoPath, repoName, phase, job, detail, done, total } = data;
    const id = deployId(repoPath);
    const bar   = document.getElementById(`deploy-bar-${id}`);
    const label = document.getElementById(`deploy-label-${id}`);
    const entry = activeDeployBtns[repoPath];
    const btn   = entry ? entry.btn : null;

    const showBar = (cls, text) => {
      if (bar)   { bar.style.display = ''; bar.className = `deploy-bar ${cls}`; }
      if (label) { label.className = `deploy-label ${cls}`; label.textContent = text; }
    };

    const hideBar = () => {
      setTimeout(() => {
        if (bar)   { bar.style.display = 'none'; bar.className = 'deploy-bar'; }
        if (label) { label.textContent = ''; label.className = 'deploy-label'; }
      }, 4000);
    };

    if (phase === 'waiting') {
      showBar('waiting', 'Aguardando CI iniciar...');
      if (btn) { btn.className = 'btn-commit deploying'; setIcon(btn, 'refresh-cw', { spin: true }); }

    } else if (phase === 'running') {
      const prog = total ? ' (' + done + '/' + total + ')' : '';
      showBar('running', (job || 'Rodando') + prog);
      if (btn) { btn.className = 'btn-commit deploying'; setIcon(btn, 'refresh-cw', { spin: true }); }

    } else if (phase === 'success') {
      showBar('success', 'Deploy concluído!');
      if (btn) { btn.className = 'btn-commit deployed'; setIcon(btn, 'check'); }
      showCommitToast('ok', (repoName || '') + ': Deploy concluído!');
      hideBar();
      delete activeDeployBtns[repoPath];
      setTimeout(() => checkRepos(), 3000);

    } else if (phase === 'failure') {
      showBar('failure', 'Deploy falhou: ' + (detail || ''));
      if (btn) { btn.className = 'btn-commit deploy-fail'; setIcon(btn, 'x'); }
      showCommitToast('err', (repoName || '') + ': Deploy falhou — ' + (detail || ''));
      hideBar();
      delete activeDeployBtns[repoPath];
      setTimeout(() => { if (btn) { btn.className = 'btn-commit'; setIcon(btn, 'arrow-up'); } }, 6000);

    } else if (phase === 'no-token' || phase === 'no-github' || phase === 'none') {
      if (btn) { btn.className = 'btn-commit deployed'; setIcon(btn, 'check'); }
      delete activeDeployBtns[repoPath];
      setTimeout(() => checkRepos(), 3000);

    } else if (phase === 'error') {
      if (btn) { btn.className = 'btn-commit'; setIcon(btn, 'alert'); }
      showCommitToast('err', (repoName || '') + ': ' + (detail || 'Erro'));
      delete activeDeployBtns[repoPath];
      setTimeout(() => { if (btn) { btn.className = 'btn-commit'; setIcon(btn, 'arrow-up'); } }, 5000);

    } else if (phase === 'timeout') {
      if (btn) { btn.className = 'btn-commit deployed'; setIcon(btn, 'check'); }
      showCommitToast('err', (repoName || '') + ': Timeout aguardando deploy');
      delete activeDeployBtns[repoPath];
      setTimeout(() => checkRepos(), 3000);
    }
  });

  function showCommitToast(type, msg) {
    const duration = type === 'err' ? 6000 : 3500;
    ipcRenderer.send('show-toast', { text: (msg || '').trim().substring(0, 200), type, duration });
  }

  // ---- Lock position ----
  let locked = false;

  function toggleLock() {
    locked = !locked;
    applyLock();
    ipcRenderer.invoke('set-locked', locked);
  }

  function applyLock() {
    const titlebar = document.querySelector('.titlebar');
    const btn = document.getElementById('lockBtn');
    titlebar.style.webkitAppRegion = locked ? 'no-drag' : 'drag';
    btn.classList.toggle('locked', locked);
    btn.title = locked ? 'Desbloquear posição' : 'Travar posição';
    setIcon(btn, locked ? 'lock' : 'unlock');
  }

  // ---- Opacity ----
  function changeOpacity(val) {
    document.getElementById('opacityVal').textContent = val + '%';
    ipcRenderer.invoke('set-opacity', val / 100);
  }

  // ---- Corner snap ----
  function snapCorner(corner) {
    ipcRenderer.invoke('snap-corner', corner);
  }

  // ---- Init ----
  async function init() {
    config = (await ipcRenderer.invoke('get-config')) || {};
    document.getElementById('intervalSelect').value = config.intervalSeconds || 30;

    // Restaura opacidade
    const opacityPct = Math.round((config.opacity || 1.0) * 100);
    document.getElementById('opacitySlider').value = opacityPct;
    document.getElementById('opacityVal').textContent = opacityPct + '%';

    // Restaura lock
    locked = config.locked || false;
    applyLock();

    // Restaura zona ghost
    updateZoneBtn(config.ghostZone);

    if (config.collapsed) {
      document.getElementById('container').classList.add('collapsed');
      const btn = document.getElementById('collapseBtn');
      setIcon(btn, 'chevron-down');
      btn.title = 'Expandir';
    }

    // Ícones dos botões titlebar
    setIcon(document.getElementById('refreshBtn'), 'refresh-cw');
    setIcon(document.getElementById('configBtn'), 'settings');
    setIcon(document.getElementById('pendingToggleBtn'), 'eye');
    setIcon(document.getElementById('modeBtn'), 'app-window');
    if (!config.collapsed) setIcon(document.getElementById('collapseBtn'), 'chevron-up');
    setIcon(document.getElementById('closeBtn'), 'x');
    // Corner buttons
    setIcon(document.getElementById('cornerTL'), 'arrow-ul', { size: 12 });
    setIcon(document.getElementById('cornerTR'), 'arrow-ur', { size: 12 });
    setIcon(document.getElementById('cornerBL'), 'arrow-dl', { size: 12 });
    setIcon(document.getElementById('cornerBR'), 'arrow-dr', { size: 12 });
    // Push All button
    setIconLabel(document.getElementById('pushAllBtn'), 'arrow-up', 'Push All');
    // Timer icon
    setIcon(document.getElementById('timerIcon'), 'timer', { size: 13 });

    startInterval(config.intervalSeconds || 30);
    let hasCached = false;
    try {
      const cache = await ipcRenderer.invoke('get-cached-repos');
      if (cache && cache.repos && cache.repos.length > 0) {
        lastResults = cache.repos;
        renderRepos(cache.repos);
        hasCached = true;
      }
    } catch (_) {}
    if (!hasCached) checkRepos();
  }

  // Recarrega quando config é salvo na janela de configuração
  ipcRenderer.on('config-saved', async () => {
    config = (await ipcRenderer.invoke('get-config')) || {};
    document.getElementById('intervalSelect').value = config.intervalSeconds || 30;
    startInterval(config.intervalSeconds || 30);
    checkRepos();
  });


  // ---- Zone selection ----
  let hasZone = false;

  function toggleZone() {
    if (hasZone) {
      ipcRenderer.invoke('clear-ghost-zone');
    } else {
      ipcRenderer.invoke('start-zone-select');
    }
  }

  function updateZoneBtn(zone) {
    const btn = document.getElementById('zoneBtn');
    hasZone = !!zone;
    if (hasZone) {
      btn.classList.add('active');
      setIconLabel(btn, 'ghost', 'Ativa');
      btn.title = 'Clique para desativar zona ghost';
    } else {
      btn.classList.remove('active');
      setIconLabel(btn, 'ghost', 'Zona');
      btn.title = 'Definir zona de detecção ghost';
    }
  }

  ipcRenderer.on('ghost-zone-updated', (_, zone) => {
    updateZoneBtn(zone);
  });

  // ---- Auto-update ----
  ipcRenderer.on('update-status', (_, status) => {
    const banner = document.getElementById('updateBanner');
    const msg    = document.getElementById('updateMsg');
    const btn    = document.getElementById('updateBtn');

    if (status.type === 'available') {
      msg.textContent = `v${status.version} disponível — iniciando download...`;
      btn.style.display = 'none';
      banner.classList.add('show');

    } else if (status.type === 'downloading') {
      msg.textContent = `Baixando v${status.version || ''}... ${status.percent}%`;
      btn.style.display = 'none';
      banner.classList.add('show');

    } else if (status.type === 'ready') {
      msg.textContent = 'v' + (status.version || '') + ' pronta — reinicie para aplicar';
      btn.style.display = '';
      setIconLabel(btn, 'refresh-cw', 'Reiniciar agora');
      banner.classList.add('show');

    } else if (status.type === 'error') {
      banner.classList.remove('show');
    }
  });

  function installUpdate() {
    ipcRenderer.invoke('install-update');
  }

  // ---- Resize handle (delegado ao main process para precisão de DPI) ----
  const resizeHandle = document.getElementById('resizeHandle');

  resizeHandle.addEventListener('mousedown', (e) => {
    resizeHandle.classList.add('dragging');
    ipcRenderer.send('resize-start');
    e.preventDefault();
  });

  document.addEventListener('mouseup', () => {
    if (resizeHandle.classList.contains('dragging')) {
      resizeHandle.classList.remove('dragging');
      ipcRenderer.send('resize-stop');
    }
  });

  init();
</script>

</body>
</html>
