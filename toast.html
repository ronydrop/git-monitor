<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --red: #f85149;
    --green: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
  }
  #toast {
    margin: 4px 8px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 7px;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 200ms ease, transform 200ms ease;
    word-break: break-word;
  }
  #toast.err  { background: rgba(248,81,73,0.18); border: 1px solid rgba(248,81,73,0.55); color: var(--red); }
  #toast.ok   { background: rgba(63,185,80,0.15); border: 1px solid rgba(63,185,80,0.50); color: var(--green); }
  #toast.info { background: rgba(88,166,255,0.12); border: 1px solid rgba(88,166,255,0.45); color: #58a6ff; font-weight: 600; font-size: 12px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  svg { flex-shrink: 0; }
</style>
</head>
<body>
<div id="toast"></div>
<script src="themes.js"></script>
<script>
  const { ipcRenderer } = require('electron');
  ipcRenderer.invoke('get-config').then(cfg => applyTheme((cfg || {}).theme || 'obsidian'));
  const _p = new DOMParser();
  const el = document.getElementById('toast');

  const ICONS = {
    err:  '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    ok:   '<path d="M20 6 9 17l-5-5"/>',
    info: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>'
  };

  function mkSvg(type) {
    const xml = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[type] || ICONS.err) + '</svg>';
    return _p.parseFromString(xml, 'image/svg+xml').documentElement;
  }

  ipcRenderer.on('toast-data', (_, { text, type }) => {
    const t = type || 'err';
    const span = document.createElement('span');
    span.textContent = text;
    el.replaceChildren(mkSvg(t), span);
    el.className = t;
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  });
</script>
</body>
</html>
