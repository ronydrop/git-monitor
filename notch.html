<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Git Monitor — Notch</title>
<style>
  :root {
    --bg: #000000;
    --notch-bg: #000000;
    --border: #2a2a2a;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --blue: #58a6ff;
    --purple: #a371f7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    font-size: 12px;
    overflow: visible;
    user-select: none;
    cursor: default;
  }

  /* Wrapper não recebe mouse events — só o pill recebe */
  #wrap {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Pill: grudado na borda direita superior, colado no topo da tela.
     Width/height/border-radius/transform animados via spring JS (rAF).
     Apenas box-shadow usa CSS transition. */
  #pill {
    position: absolute;
    top: 0;
    left: 50%;
    width: 310px;
    height: 38px;
    background: var(--notch-bg);
    color: var(--text);
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 18px;
    overflow: hidden;
    pointer-events: auto;
    box-shadow: 0 4px 24px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.06) inset;
    will-change: width, height, transform, box-shadow;
    transition: box-shadow 400ms ease, opacity 200ms ease;
  }
  #pill.ghost { opacity: 0.12; }

  #pill.expanded {
    box-shadow: 0 12px 40px rgba(0,0,0,0.95), 0 1px 0 rgba(255,255,255,0.06) inset;
  }

  /* Glow states (prioridade: diverged > deploy-running > dirty > deploy-success) */
  #pill.glow-diverged:not(.expanded) {
    box-shadow:
      0 4px 24px rgba(0,0,0,0.9),
      0 0 14px 3px rgba(248,81,73,0.35),
      0 0 6px 1px rgba(248,81,73,0.2),
      0 1px 0 rgba(255,255,255,0.06) inset;
  }
  #pill.glow-deploy-running:not(.expanded) {
    box-shadow:
      0 4px 24px rgba(0,0,0,0.9),
      0 0 12px 3px rgba(210,153,34,0.35),
      0 1px 0 rgba(255,255,255,0.06) inset;
  }
  #pill.glow-dirty:not(.expanded) {
    box-shadow:
      0 4px 24px rgba(0,0,0,0.9),
      0 0 12px 3px rgba(217,120,87,0.35),
      0 0 6px 1px rgba(217,120,87,0.2),
      0 1px 0 rgba(255,255,255,0.06) inset;
  }
  #pill.glow-deploy-success:not(.expanded) {
    box-shadow:
      0 4px 24px rgba(0,0,0,0.9),
      0 0 12px 3px rgba(63,185,80,0.3),
      0 1px 0 rgba(255,255,255,0.06) inset;
  }

  #mini-list {
    position: absolute;
    top: 38px;
    left: 0; right: 0;
    padding: 2px 10px 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 120ms ease;
  }
  #pill.alert:not(.expanded) #mini-list {
    opacity: 1;
    pointer-events: auto;
  }


  /* Pin dot (canto superior direito quando pinned) */
  #pinDot {
    position: absolute;
    top: 8px;
    right: 10px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0;
    transition: opacity 200ms ease;
    pointer-events: none;
  }
  #pill.pinned:not(.expanded) #pinDot { opacity: 0.7; }
  #pill.pinned.expanded #pinDot { opacity: 1; }

  /* Baseline compact (sempre renderizado, fade in/out via opacity) */
  #compact {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    height: 38px;
    opacity: 1;
    transition: opacity 120ms ease;
    cursor: pointer;
  }
  #compact.dragging { cursor: grabbing; }
  #pill.expanded #compact { opacity: 0; pointer-events: none; cursor: default; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .dot.clean     { color: var(--green);  background: var(--green);  box-shadow: none; }
  .dot.dirty     { color: var(--orange); background: var(--orange); }
  .dot.dirty-ahead { color: var(--orange); background: var(--orange); }
  .dot.ahead     { color: var(--orange); background: var(--orange); }
  .dot.behind    { color: var(--blue);   background: var(--blue); }
  .dot.diverged  { color: var(--red);    background: var(--red); }
  .dot.busy      { color: var(--yellow); background: var(--yellow); opacity: 0.6; }
  .dot.error     { color: var(--red);    background: var(--red);    opacity: 0.7; }

  #countText {
    font-size: 14px;
    font-weight: 800;
    color: var(--orange);
    font-feature-settings: 'tnum';
    min-width: 14px;
  }
  #countText.clean { color: var(--text-dim); font-weight: 600; font-size: 13px; }

  #compact #labelText {
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  #ghIcon {
    width: 16px; height: 16px;
    opacity: 0.75;
    flex-shrink: 0;
    fill: #e6edf3;
  }

  /* Expanded panel */
  #expanded {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    transition: opacity 120ms ease 60ms; /* pequeno delay pra entrar depois do reshape */
  }
  #pill.expanded #expanded {
    opacity: 1;
    pointer-events: auto;
  }

  #hdr {
    height: 42px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    background: var(--notch-bg);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .hdr-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .hdr-git-icon { width: 14px; height: 14px; fill: #e6edf3; opacity: 0.75; flex-shrink: 0; }
  .hdr-left .count { font-weight: 800; font-size: 14px; color: var(--orange); }
  .hdr-left .count.clean { color: var(--text-dim); font-weight: 600; }
  .hdr-left .label {
    font-size: 11.5px;
    color: rgba(255,255,255,0.45);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .hdr-actions { display: flex; align-items: center; gap: 4px; }
  #pill.expanded #hdr { cursor: grab; }
  #pill.expanded #hdr.dragging { cursor: grabbing; }
  #pill.expanded #hdr .hdr-btn { cursor: pointer; }

  .hdr-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 150ms ease, color 150ms ease;
    padding: 0;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .hdr-btn:disabled { opacity: 0.4; pointer-events: none; }
  .hdr-btn.labeled { width: auto; padding: 0 8px; gap: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; }

  /* Scrollable list */
  #list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 10px 12px;
  }
  #list::-webkit-scrollbar { width: 0; }
  #list { scrollbar-width: none; }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 12px;
    transition: background 150ms ease;
    min-height: 32px;
  }
  .row:hover { background: rgba(255,255,255,0.06); }
  .name-group {
    display: flex;
    flex-direction: column;
    gap: 1px;
    max-width: 140px;
    overflow: hidden;
  }
  .row .name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row .path {
    font-size: 9.5px;
    color: var(--text-dim);
    opacity: 0.6;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
  }
  .row .detail {
    font-size: 10.5px;
    color: var(--text-dim);
    font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row .actions {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    cursor: pointer;
    height: 22px;
    padding: 0 8px;
    border-radius: 5px;
    font-size: 10.5px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn.icon {
    width: 24px; padding: 0;
    font-size: 12px;
    position: relative;
  }
  .btn.icon::after { content: ''; position: absolute; inset: 0; }
  .btn.push {
    color: var(--orange);
    border-color: rgba(219,109,40,0.4);
  }
  .btn.push:hover { background: rgba(219,109,40,0.12); }
  .btn.pull {
    color: var(--purple);
    border-color: rgba(163,113,247,0.4);
  }
  .btn.pull:hover { background: rgba(163,113,247,0.12); }
  .btn.running {
    color: var(--yellow);
    border-color: rgba(210,153,34,0.4);
    pointer-events: none;
  }
  .btn.running .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .icon-spin { animation: spin 1s linear infinite; transform-origin: center; transform-box: fill-box; }
  .btn.done {
    color: var(--green);
    border-color: rgba(63,185,80,0.4);
  }
  .btn.fail {
    color: var(--red);
    border-color: rgba(248,81,73,0.4);
  }
  .btn svg { pointer-events: none; }
  .btn.deploying {
    color: var(--yellow);
    border-color: rgba(210,153,34,0.4);
    pointer-events: none;
  }
  .btn.deploying .icon-spin { animation: spin 1s linear infinite; }
  .btn.deployed {
    color: var(--green);
    border-color: rgba(63,185,80,0.4);
  }
  .btn.deploy-fail {
    color: var(--red);
    border-color: rgba(248,81,73,0.4);
  }

  #empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-dim);
    font-size: 11px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="pill">
    <div id="pinDot"></div>

    <!-- Baseline compact -->
    <div id="compact">
      <svg id="ghIcon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      <span id="countText" class="clean">0</span>
      <span id="labelText">Tudo sincronizado</span>
    </div>

    <!-- Mini-list colapsada: só pendentes -->
    <div id="mini-list"></div>

    <!-- Expanded panel -->
    <div id="expanded">
      <div id="hdr">
        <div class="hdr-left">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" class="hdr-git-icon"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          <span class="count clean" id="countHdr">0</span>
          <span class="label" id="labelHdr">Tudo sincronizado</span>
        </div>
        <div class="hdr-actions">
          <button class="hdr-btn labeled" id="btnPushAll" title="Push All"></button>
          <button class="hdr-btn" id="btnCfg" title="Configurações"></button>
          <button class="hdr-btn" id="btnFloat" title="Abrir widget flutuante"></button>
          <button class="hdr-btn" id="btnMin" title="Minimizar (Ctrl+Shift+H)"></button>
        </div>
      </div>
      <div id="list">
        <div id="empty" style="display:none;">Nenhum repositório configurado.</div>
      </div>
    </div>
  </div>
</div>

<script src="themes.js"></script>
<script>
  const { ipcRenderer } = require('electron');

  const ICONS = {
    'refresh-cw':   '<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>',
    'settings':     '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
    'minus':        '<path d="M5 12h14"/>',
    'x':            '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    'check':        '<path d="M20 6 9 17l-5-5"/>',
    'alert':        '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    'arrow-up':     '<path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>',
    'arrow-down':   '<path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>',
    'folder':       '<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
    'app-window':   '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/>',
    'eye':          '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
  };

  const _svgParser = new DOMParser();

  function icon(name, opts) {
    opts = opts || {};
    const size = opts.size || 16;
    const cls = opts.spin ? ' class="icon-spin"' : '';
    const xml = '<svg xmlns="http://www.w3.org/2000/svg"' + cls + ' width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="pointer-events:none">' + ICONS[name] + '</svg>';
    return _svgParser.parseFromString(xml, 'image/svg+xml').documentElement;
  }

  function setIcon(target, name, opts) {
    target.replaceChildren(icon(name, opts));
  }

  function setIconLabel(target, name, text, opts) {
    target.replaceChildren(icon(name, opts), document.createTextNode('\u00A0' + text));
  }

  const pill = document.getElementById('pill');
  const compactEl = document.getElementById('compact');
  const expandedEl = document.getElementById('expanded');
  const listEl = document.getElementById('list');
  const miniListEl = document.getElementById('mini-list');
  const emptyEl = document.getElementById('empty');

  const countText = document.getElementById('countText');
  const labelText = document.getElementById('labelText');

  const countHdr = document.getElementById('countHdr');
  const labelHdr = document.getElementById('labelHdr');

  const btnPushAll = document.getElementById('btnPushAll');
  const btnCfg = document.getElementById('btnCfg');
  const btnFloat = document.getElementById('btnFloat');
  const btnMin = document.getElementById('btnMin');

  // Ícones dos botões
  setIconLabel(btnPushAll, 'arrow-up', 'Push All', { size: 14 });
  setIcon(btnCfg, 'settings', { size: 14 });
  setIcon(btnFloat, 'app-window', { size: 14 });
  setIcon(btnMin, 'minus', { size: 14 });

  const CLOSE_DELAY_MS = 300;
  const WINDOW_WIDTH = 440;

  let repos = [];
  let loaded = false;
  let hovered = false;
  let pinned = false;
  let minimized = false;
  let wasExpanded = false;
  let leaveTimer = null;
  let pollTimer = null;
  const runningActions = new Set();
  const deployPhases = {};
  let recentDeploySuccess = false;
  let deploySuccessTimer = null;
  const deployingRows = {};
  let pushAllPending = 0;
  let pushAllTotal = 0;
  let pushAllFailures = 0;

  // Spring animator — fisica simples com stiffness/damping, interrompível
  function createSpring(initialConfig) {
    let stiffness = initialConfig.stiffness ?? 300;
    let damping   = initialConfig.damping ?? 24;
    const precision = 0.15;
    let rafId = null;
    let current = initialConfig.initial ?? 0;
    let target  = current;
    let velocity = 0;
    let lastTime = 0;
    const onUpdate = initialConfig.onUpdate;

    function step(now) {
      const dt = Math.min((now - lastTime) / 1000, 1 / 30);
      lastTime = now;
      const force = -stiffness * (current - target);
      const damp  = -damping * velocity;
      velocity += (force + damp) * dt;
      current  += velocity * dt;
      onUpdate(current);
      if (Math.abs(velocity) < precision && Math.abs(current - target) < precision) {
        current = target; velocity = 0;
        onUpdate(current);
        rafId = null;
        return;
      }
      rafId = requestAnimationFrame(step);
    }

    return {
      set(v) { current = v; target = v; velocity = 0; onUpdate(current); },
      animate(newTarget) {
        target = newTarget;
        if (rafId == null) { lastTime = performance.now(); rafId = requestAnimationFrame(step); }
      },
      reconfigure(cfg) { stiffness = cfg.stiffness ?? stiffness; damping = cfg.damping ?? damping; },
      get() { return current; },
    };
  }

  const SPRING_OPEN     = { stiffness: 300, damping: 24 };
  const SPRING_CLOSE    = { stiffness: 280, damping: 30 };
  const SPRING_MINIMIZE = { stiffness: 320, damping: 30 };

  function makeEl(tag, props, children) {
    const el = document.createElement(tag);
    if (props) Object.entries(props).forEach(([k, v]) => {
      if (k === 'className') el.className = v;
      else if (k === 'textContent') el.textContent = v;
      else if (k === 'dataset') Object.entries(v).forEach(([dk, dv]) => { el.dataset[dk] = dv; });
      else if (k === 'title') el.title = v;
      else el.setAttribute(k, v);
    });
    if (children) children.forEach(c => { if (c) el.appendChild(c); });
    return el;
  }

  const widthSpring = createSpring({ initial: 310, onUpdate: v => pill.style.width = v + 'px' });
  const heightSpring = createSpring({ initial: 38,  onUpdate: v => pill.style.height = v + 'px' });
  const radiusSpring = createSpring({ initial: 18,  onUpdate: v => {
    pill.style.borderBottomLeftRadius = v + 'px';
    pill.style.borderBottomRightRadius = v + 'px';
  }});
  const translateSpring = createSpring({ stiffness: SPRING_MINIMIZE.stiffness, damping: SPRING_MINIMIZE.damping, initial: 0, onUpdate: v => pill.style.transform = `translateX(-50%) translateY(${v}px)` });

  const STATUS_ORDER = {
    diverged: 0, behind: 1, ahead: 2, 'dirty-ahead': 3,
    dirty: 4, busy: 5, error: 6, clean: 7
  };

  function dominantStatus(list) {
    if (!list.length) return 'clean';
    return [...list].sort((a, b) =>
      (STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99)
    )[0].status;
  }

  function isPendingList() {
    return repos.some(r => r.pending);
  }
  function hasDiverged() {
    return repos.some(r => r.status === 'diverged');
  }
  function pendingCount() {
    return repos.filter(r => r.pending).length;
  }

  function isExpanded() {
    const deploying = Object.keys(deployingRows).length > 0;
    return !minimized && (pinned || (!deploying && hovered));
  }

  function updateSummary() {
    const total = repos.length;
    const nPending = pendingCount();
    const hasPending = nPending > 0;
    const dom = hasPending ? dominantStatus(repos.filter(r => r.pending)) : 'clean';

    if (hasPending) {
      countText.className = '';
      countHdr.className = 'count';
      countText.textContent = String(nPending);
      countHdr.textContent = String(nPending);

      const verb = {
        dirty: 'commit pendente',
        'dirty-ahead': 'commit+push',
        ahead: 'push pendente',
        behind: 'pull pendente',
        diverged: 'diverged',
        error: 'erro'
      }[dom] || 'pendente';

      const first = repos.find(r => r.pending);
      const label = nPending === 1
        ? (first.name + ' — ' + verb)
        : (nPending + ' repos — ' + verb);
      labelText.textContent = label;
      labelHdr.textContent = nPending === 1 ? label : ('repos — ' + verb);
    } else {
      countText.className = 'clean';
      countHdr.className = 'count clean';
      setIcon(countText, 'check', { size: 12 });
      setIcon(countHdr, 'check', { size: 12 });
      const label = total === 0 ? 'Sem repos' : (total + ' repos sincronizados');
      labelText.textContent = label;
      labelHdr.textContent = label;
    }
  }

  function renderRow(r) {
    const cls = r.status || 'clean';
    const isRunning = runningActions.has(r.path);

    const dot = makeEl('span', { className: 'dot ' + cls });
    const nameGroup = makeEl('div', { className: 'name-group' });
    nameGroup.appendChild(makeEl('span', { className: 'name', textContent: r.name || '(sem nome)' }));
    if (r.path) nameGroup.appendChild(makeEl('span', { className: 'path', textContent: r.path }));
    const detail = makeEl('span', { className: 'detail', textContent: r.detail || (r.status === 'clean' ? 'limpo' : '') });

    const actions = makeEl('div', { className: 'actions' });

    const hasChanges  = r.status === 'dirty' || r.status === 'dirty-ahead' || r.status === 'ahead';

    const folderBtn = makeEl('button', {
      className: 'btn icon',
      title: 'Abrir pasta',
      dataset: { act: 'folder', path: r.path || '' }
    });
    folderBtn.appendChild(icon('folder', { size: 12 }));
    folderBtn.addEventListener('click', onRowAction);
    actions.appendChild(folderBtn);

    if (r.remoteUrl) {
      const gitBtn = makeEl('button', { className: 'btn icon', title: 'Abrir no GitHub' });
      const ghSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      ghSvg.setAttribute('viewBox', '0 0 16 16');
      ghSvg.setAttribute('width', '12');
      ghSvg.setAttribute('height', '12');
      ghSvg.setAttribute('fill', 'currentColor');
      const ghPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      ghPath.setAttribute('d', 'M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z');
      ghSvg.appendChild(ghPath);
      gitBtn.appendChild(ghSvg);
      gitBtn.addEventListener('click', () => ipcRenderer.invoke('open-git-url', r.remoteUrl));
      actions.appendChild(gitBtn);
    }

    if (hasChanges) {
      const diffBtn = makeEl('button', {
        className: 'btn icon',
        title: 'Ver diff',
        dataset: { act: 'diff', path: r.path || '', name: r.name || '' }
      });
      diffBtn.appendChild(icon('eye', { size: 12 }));
      diffBtn.addEventListener('click', onRowAction);
      actions.appendChild(diffBtn);
    }

    const needsPull   = r.status === 'behind';
    const isDeploying = !!(deployingRows && deployingRows[r.path]);
    if (hasChanges || needsPull || isDeploying) {
      const isPull = needsPull && !isDeploying;
      const actBtn = makeEl('button', {
        className: 'btn icon ' + (isPull ? 'pull' : 'push') + (isRunning ? ' running' : isDeploying ? ' deploying' : ''),
        title: isPull ? 'Pull' : (isDeploying ? 'Aguardando deploy…' : 'Commit + push'),
        dataset: {
          act: isPull ? 'pull' : 'push',
          path: r.path || '',
          name: r.name || ''
        }
      });
      if (isRunning) {
        actBtn.appendChild(icon('refresh-cw', { size: 12, spin: true }));
      } else if (isDeploying) {
        const ic = icon('refresh-cw', { size: 12 });
        ic.classList.add('icon-spin');
        actBtn.appendChild(ic);
      } else {
        actBtn.appendChild(icon(isPull ? 'arrow-down' : 'arrow-up', { size: 12 }));
      }
      if (!isDeploying) actBtn.addEventListener('click', onRowAction);
      actions.appendChild(actBtn);
    }

    return makeEl('div', { className: 'row' }, [dot, nameGroup, detail, actions]);
  }

  function renderList() {
    listEl.replaceChildren(emptyEl);
    if (repos.length === 0) {
      emptyEl.style.display = '';
      emptyEl.textContent = loaded ? 'Nenhum repositório configurado.' : 'Carregando…';
      return;
    }
    emptyEl.style.display = 'none';
    repos.forEach(r => listEl.appendChild(renderRow(r)));
    renderMiniList();
  }

  function renderMiniList() {
    const pending = repos.filter(r => r.pending);
    miniListEl.replaceChildren(...pending.map(r => renderRow(r)));
  }

  function measureExpandedHeight() {
    let contentH = 0;
    for (const child of listEl.children) {
      if (child.style.display !== 'none') contentH += child.offsetHeight;
    }
    const cs = getComputedStyle(listEl);
    contentH += parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    const total = 38 + Math.min(contentH, 320);
    return Math.min(Math.max(total, 60), 390);
  }

  function applyGlowClass() {
    ['glow-diverged','glow-deploy-running','glow-dirty','glow-deploy-success']
      .forEach(c => pill.classList.remove(c));
    if (!repos.length) return;
    const hasDivg  = repos.some(r => r.status === 'diverged');
    const depRun   = Object.values(deployPhases).some(p => p === 'running' || p === 'waiting');
    const hasDirty = repos.some(r => ['dirty','dirty-ahead','ahead'].includes(r.status));
    if (hasDivg)              pill.classList.add('glow-diverged');
    else if (depRun)          pill.classList.add('glow-deploy-running');
    else if (hasDirty)        pill.classList.add('glow-dirty');
    else if (recentDeploySuccess) pill.classList.add('glow-deploy-success');
  }

  function updateShape() {
    const exp = isExpanded();
    const alert = isPendingList();
    const isMin = minimized && !hovered;

    pill.classList.toggle('expanded', exp);
    pill.classList.toggle('alert', alert && !exp);
    pill.classList.toggle('pinned', pinned);
    applyGlowClass();
    compactEl.title = pinned ? 'Fixado — clique para soltar | arraste para mover' : 'Clique para fixar | arraste para mover';

    const targetW      = exp ? 420 : (alert ? 320 : 310);
    const targetRadius = exp ? 28  : (alert ? 14  : 18);
    const targetTranslate = isMin ? -34 : 0;
    const cfg = exp ? SPRING_OPEN : SPRING_CLOSE;
    widthSpring.reconfigure(cfg);
    heightSpring.reconfigure(cfg);
    radiusSpring.reconfigure(cfg);

    if (exp) {
      if (!wasExpanded) listEl.scrollTop = 0;
      requestAnimationFrame(() => {
        const h = measureExpandedHeight();
        widthSpring.animate(targetW);
        heightSpring.animate(h);
        radiusSpring.animate(targetRadius);
        notifyRect(targetW, h, targetTranslate);
      });
    } else if (alert) {
      requestAnimationFrame(() => {
        const miniH = 38 + (miniListEl.scrollHeight || 0);
        widthSpring.animate(targetW);
        heightSpring.animate(miniH);
        radiusSpring.animate(targetRadius);
        notifyRect(targetW, miniH, targetTranslate);
      });
    } else {
      widthSpring.animate(targetW);
      heightSpring.animate(38);
      radiusSpring.animate(targetRadius);
      notifyRect(targetW, 38, targetTranslate);
    }

    translateSpring.animate(targetTranslate);
    wasExpanded = exp;
  }

  function notifyRect(w, h, offsetY) {
    ipcRenderer.send('notch-rect', { w, h, offsetY, hotzone: null, left: Math.round((WINDOW_WIDTH - w) / 2) });
  }

  // ------ Interações ------

  pill.addEventListener('mouseenter', () => {
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    hovered = true;
    updateShape();
  });

  pill.addEventListener('mouseleave', () => {
    if (leaveTimer) clearTimeout(leaveTimer);
    leaveTimer = setTimeout(() => {
      leaveTimer = null;
      hovered = false;
      updateShape();
    }, CLOSE_DELAY_MS);
    if (ghostActive) {
      ghostActive = false;
      pill.classList.remove('ghost');
      ipcRenderer.send('notch-ghost', false);
    }
  });

  let ghostActive = false;
  pill.addEventListener('mousemove', (ev) => {
    const want = ev.ctrlKey;
    if (want === ghostActive) return;
    ghostActive = want;
    pill.classList.toggle('ghost', ghostActive);
    ipcRenderer.send('notch-ghost', ghostActive);
  });

  pill.addEventListener('click', (ev) => {
    if (ev.target.closest('.hdr-btn, .btn, #hdr')) return;
    if (minimized) {
      minimized = false;
    } else if (!isExpanded()) {
      if (ev.target.closest('#compact')) pinned = !pinned;
    }
    updateShape();
  });

  // Drag horizontal no compact bar
  compactEl.addEventListener('mousedown', (e) => {
    if (e.button !== 0 || isExpanded()) return;
    let dragged = false;

    const onMove = () => {
      if (!dragged) ipcRenderer.send('notch-drag-start');
      dragged = true;
      compactEl.classList.add('dragging');
    };
    const onUp = () => {
      compactEl.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (dragged) {
        ipcRenderer.send('notch-drag-end');
        compactEl.addEventListener('click', ev => ev.stopPropagation(), { once: true, capture: true });
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // Drag horizontal no header expandido
  const hdrEl = document.getElementById('hdr');
  hdrEl.addEventListener('mousedown', (e) => {
    if (e.button !== 0 || !isExpanded() || e.target.closest('.hdr-btn')) return;
    let dragged = false;

    const onMove = () => {
      if (!dragged) ipcRenderer.send('notch-drag-start');
      dragged = true;
      hdrEl.classList.add('dragging');
    };
    const onUp = () => {
      hdrEl.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (dragged) {
        ipcRenderer.send('notch-drag-end');
        pill.addEventListener('click', ev => ev.stopPropagation(), { once: true, capture: true });
      } else {
        // click sem arrastar no header → fecha
        pinned = false;
        hovered = false;
        if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
        updateShape();
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  btnCfg.addEventListener('click', (ev) => {
    ev.stopPropagation();
    ipcRenderer.invoke('open-config-window');
  });

  btnFloat.addEventListener('click', async (ev) => {
    ev.stopPropagation();
    await ipcRenderer.invoke('set-widget-mode', 'floating');
  });

  btnPushAll.addEventListener('click', async (ev) => {
    ev.stopPropagation();
    const pushable = repos.filter(r =>
      r.status === 'dirty' || r.status === 'dirty-ahead' || r.status === 'ahead'
    );
    if (pushable.length === 0) return;

    // Pausa polling para evitar race conditions durante o push all
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    btnPushAll.disabled = true;
    let done = 0;
    setIconLabel(btnPushAll, 'refresh-cw', `0/${pushable.length}`, { size: 14, spin: true });

    pushable.forEach(r => { runningActions.add(r.path); });
    renderList();

    pushAllPending = 0;
    pushAllTotal = 0;
    pushAllFailures = 0;

    await Promise.all(pushable.map((r, i) =>
      new Promise(resolve => setTimeout(async () => {
        let ok = false, errMsg = '';
        try {
          const res = await ipcRenderer.invoke('commit-and-push', r.path);
          ok = !!(res && res.ok);
          errMsg = (res && res.error) || '';
        } catch (e) {
          errMsg = e.message || String(e);
        }
        runningActions.delete(r.path);
        if (ok) {
          markRowDeploying(r.path);
          deployingRows[r.path] = { repoName: r.name || r.path, fromPushAll: true };
          ipcRenderer.send('watch-deploy-start', { repoPath: r.path, repoName: r.name || r.path });
          pushAllPending++;
          pushAllTotal++;
        } else {
          markRowResult(r.path, 'fail', errMsg);
        }
        done++;
        setIconLabel(btnPushAll, 'refresh-cw', `${done}/${pushable.length}`, { size: 14, spin: true });
        resolve();
      }, i * 120))
    ));

    if (pushAllTotal === 0) {
      setIconLabel(btnPushAll, 'x', 'Push falhou', { size: 14 });
      setTimeout(() => {
        setIconLabel(btnPushAll, 'arrow-up', 'Push All', { size: 14 });
        btnPushAll.disabled = false;
        startPolling();
      }, 3000);
    } else {
      setIconLabel(btnPushAll, 'refresh-cw', `Deploy 0/${pushAllTotal}`, { size: 14, spin: true });
    }
  });

  btnMin.addEventListener('click', (ev) => {
    ev.stopPropagation();
    minimized = true;
    pinned = false;
    hovered = false;
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    updateShape();
  });

  // Ctrl+Shift+H (via global shortcut no main) — toggle
  ipcRenderer.on('notch-toggle-minimize', () => {
    minimized = !minimized;
    if (minimized) { pinned = false; hovered = false; }
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    updateShape();
  });

  async function onRowAction(ev) {
    ev.stopPropagation();
    const btn = ev.currentTarget;
    const act = btn.dataset.act;
    const p = btn.dataset.path;
    if (!p) return;

    if (act === 'folder') {
      ipcRenderer.invoke('open-folder', p);
      return;
    }
    if (act === 'diff') {
      ipcRenderer.invoke('open-diff-window', p, btn.dataset.name || '');
      return;
    }
    if (act === 'push' || act === 'pull') {
      runningActions.add(p);
      renderList();
      let ok = false, errMsg = '';
      try {
        const channel = act === 'push' ? 'commit-and-push' : 'git-pull';
        const res = await ipcRenderer.invoke(channel, p);
        ok = !!(res && res.ok);
        errMsg = (res && res.error) || '';
      } catch (e) {
        ok = false;
        errMsg = e.message || String(e);
      }
      runningActions.delete(p);
      const rname = btn.dataset.name || p;
      if (!ok) {
        markRowResult(p, 'fail', errMsg);
        if (errMsg) rowToast('err', rname + ': ' + errMsg.substring(0, 160), 6000);
      } else if (act === 'pull') {
        markRowResult(p, 'done', '');
        rowToast('ok', rname + ': Pull concluído!');
      } else {
        markRowDeploying(p);
        deployingRows[p] = { repoName: rname, fromPushAll: false };
        ipcRenderer.send('watch-deploy-start', { repoPath: p, repoName: rname });
      }
      setTimeout(() => refresh(), 900);
    }
  }

  function markRowResult(repoPath, kind, detail) {
    listEl.querySelectorAll('button.btn').forEach(btn => {
      if (btn.dataset.path !== repoPath) return;
      const act = btn.dataset.act;
      if (act !== 'push' && act !== 'pull') return;
      btn.classList.remove('running');
      btn.classList.add(kind);
      btn.replaceChildren(icon(kind === 'done' ? 'check' : 'x', { size: 12 }));
      if (detail) btn.title = detail;
    });
  }

  function markRowDeploying(repoPath) {
    listEl.querySelectorAll('button.btn[data-act="push"]').forEach(btn => {
      if (btn.dataset.path !== repoPath) return;
      btn.className = 'btn icon deploying';
      const ic = icon('refresh-cw', { size: 12 });
      ic.classList.add('icon-spin');
      btn.replaceChildren(ic);
    });
  }

  function updateRowPhase(repoPath, cls, iconName) {
    listEl.querySelectorAll('button.btn[data-act="push"]').forEach(btn => {
      if (btn.dataset.path !== repoPath) return;
      btn.className = cls ? `btn icon ${cls}` : 'btn icon';
      btn.replaceChildren(icon(iconName, { size: 12 }));
    });
  }

  function restoreRowBtn(repoPath) {
    listEl.querySelectorAll('button.btn[data-act="push"]').forEach(btn => {
      if (btn.dataset.path !== repoPath) return;
      btn.className = 'btn icon push';
      btn.replaceChildren(icon('arrow-up', { size: 12 }));
    });
  }

  function rowToast(type, text, duration) {
    ipcRenderer.send('show-toast', { text: String(text).substring(0, 200), type, duration: duration || (type === 'err' ? 6000 : 3000) });
  }

  async function refresh() {
    try {
      const res = await ipcRenderer.invoke('notch-all-repos');
      repos = (res && res.repos) || [];
      renderList();
      updateSummary();
      updateShape();
    } catch (e) {
      console.warn('[notch] refresh falhou:', e);
    } finally {
      loaded = true;
    }
  }

  async function startPolling(skipFirstRefresh = false) {
    try {
      const cfg = (await ipcRenderer.invoke('get-config')) || {};
      const seconds = Math.max(10, cfg.intervalSeconds || 30);
      if (!skipFirstRefresh) refresh();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(refresh, seconds * 1000);
    } catch (e) {
      console.warn('[notch] startPolling falhou:', e);
      setTimeout(() => startPolling(), 2000);
    }
  }

  ipcRenderer.on('config-saved', async () => {
    const cfg = (await ipcRenderer.invoke('get-config')) || {};
    applyTheme(cfg.theme || 'obsidian');
    startPolling();
  });

  ipcRenderer.on('deploy-update', (_, data) => {
    const { repoPath, phase, done, detail } = data;
    if (done || phase === 'none') {
      if (phase === 'success') {
        recentDeploySuccess = true;
        if (deploySuccessTimer) clearTimeout(deploySuccessTimer);
        deploySuccessTimer = setTimeout(() => {
          recentDeploySuccess = false;
          deploySuccessTimer = null;
          applyGlowClass();
        }, 4000);
      }
      delete deployPhases[repoPath];
    } else {
      deployPhases[repoPath] = phase;
    }
    applyGlowClass();

    const entry = deployingRows[repoPath];
    if (!entry) return;
    const rname = entry.repoName;
    const terminal = done || phase === 'none';

    if (phase === 'waiting' || phase === 'running') {
      markRowDeploying(repoPath);
    } else if (phase === 'success') {
      updateRowPhase(repoPath, 'deployed', 'check');
      rowToast('ok', rname + ': Deploy concluído!');
      setTimeout(() => restoreRowBtn(repoPath), 4000);
    } else if (phase === 'failure' || phase === 'timeout') {
      updateRowPhase(repoPath, 'deploy-fail', 'x');
      rowToast('err', rname + ': ' + (phase === 'timeout' ? 'Timeout aguardando deploy' : 'Deploy falhou' + (detail ? ' — ' + detail : '')), 6000);
      setTimeout(() => restoreRowBtn(repoPath), 6000);
    } else if (phase === 'error') {
      updateRowPhase(repoPath, '', 'alert');
      rowToast('err', rname + ': ' + (detail || 'Erro no deploy'), 6000);
      setTimeout(() => restoreRowBtn(repoPath), 5000);
    } else if (phase === 'no-token' || phase === 'no-github' || phase === 'none') {
      updateRowPhase(repoPath, '', 'alert');
      setTimeout(() => restoreRowBtn(repoPath), 4000);
    }

    if (terminal) {
      const wasPushAll = entry.fromPushAll;
      delete deployingRows[repoPath];
      if (wasPushAll) {
        if (phase !== 'success') pushAllFailures++;
        pushAllPending--;
        const deployedCount = pushAllTotal - pushAllPending;
        if (pushAllPending > 0) {
          setIconLabel(btnPushAll, 'refresh-cw', `Deploy ${deployedCount}/${pushAllTotal}`, { size: 14, spin: true });
        } else {
          if (pushAllFailures === 0) {
            setIconLabel(btnPushAll, 'check', 'Feito!', { size: 14 });
          } else {
            setIconLabel(btnPushAll, 'x', 'Deploy falhou', { size: 14 });
          }
          setTimeout(() => {
            setIconLabel(btnPushAll, 'arrow-up', 'Push All', { size: 14 });
            btnPushAll.disabled = false;
            startPolling();
          }, pushAllFailures === 0 ? 3000 : 4000);
        }
      }
    }
  });

  async function paintFromCache() {
    try {
      const cache = await ipcRenderer.invoke('get-cached-repos');
      if (cache && cache.notch && cache.notch.repos && cache.notch.repos.length > 0) {
        repos = cache.notch.repos;
        loaded = true;
        renderList();
        updateSummary();
        updateShape();
        return true;
      }
    } catch (_) {}
    return false;
  }

  async function paintFromConfig() {
    try {
      const cfg = (await ipcRenderer.invoke('get-config')) || {};
      const active = (cfg.repos || []).filter(r => r.enabled !== false);
      if (active.length === 0) return false;
      repos = active.map(r => ({ name: r.name, path: r.path, status: 'busy', detail: 'Verificando…', pending: false }));
      renderList();
      updateSummary();
      updateShape();
      return true;
    } catch (_) { return false; }
  }

  // Inicial: notifica rect baseline pro passthrough do main
  updateShape();
  ipcRenderer.invoke('get-config').then(cfg => applyTheme((cfg || {}).theme || 'obsidian'));
  paintFromCache().then(async hasCached => {
    if (!hasCached) await paintFromConfig();
    startPolling();
  });
</script>
</body>
</html>
