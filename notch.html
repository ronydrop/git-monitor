<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Git Monitor — Notch</title>
<style>
  :root {
    --bg: #000;
    --border: #22272e;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --blue: #58a6ff;
    --purple: #a371f7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    font-size: 12px;
    overflow: hidden;
    user-select: none;
    cursor: default;
  }

  /* Wrapper não recebe mouse events — só o pill recebe */
  #wrap {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Pill: grudado na borda direita superior, colado no topo da tela.
     Transições: width/height/border-radius com bouncy overshoot (open),
     transform com easing suave (minimize/restore).
     Close acontece via classe `.closing` — troca pra curva sem overshoot. */
  #pill {
    position: absolute;
    top: 0;
    right: 0;
    width: 260px;
    height: 38px;
    background: #000;
    color: var(--text);
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 18px;
    overflow: hidden;
    pointer-events: auto;
    will-change: width, height, transform, box-shadow, border-radius;
    transition:
      width 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
      height 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
      border-bottom-left-radius 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
      border-bottom-right-radius 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 280ms cubic-bezier(0.25, 0, 0, 1),
      box-shadow 400ms ease;
  }

  #pill.closing {
    transition:
      width 300ms cubic-bezier(0.25, 0, 0, 1),
      height 300ms cubic-bezier(0.25, 0, 0, 1),
      border-bottom-left-radius 300ms cubic-bezier(0.25, 0, 0, 1),
      border-bottom-right-radius 300ms cubic-bezier(0.25, 0, 0, 1),
      transform 280ms cubic-bezier(0.25, 0, 0, 1),
      box-shadow 400ms ease;
  }

  #pill.expanded {
    width: 420px;
    height: var(--expanded-h, 320px);
    border-bottom-left-radius: 28px;
    border-bottom-right-radius: 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.75);
  }

  #pill.minimized {
    transform: translateY(-34px);
  }

  #pill.alert {
    box-shadow:
      0 0 14px 3px rgba(219,109,40,0.35),
      0 0 6px 1px rgba(219,109,40,0.20);
  }
  #pill.alert.critical {
    box-shadow:
      0 0 14px 3px rgba(248,81,73,0.45),
      0 0 6px 1px rgba(248,81,73,0.25);
  }
  /* Quando expandido, a sombra de profundidade substitui o glow */
  #pill.expanded.alert,
  #pill.expanded.alert.critical {
    box-shadow: 0 4px 16px rgba(0,0,0,0.75);
  }

  /* Pin dot (canto superior direito quando pinned) */
  #pinDot {
    position: absolute;
    top: 8px;
    right: 10px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 5px var(--orange);
    opacity: 0;
    transition: opacity 200ms ease;
    pointer-events: none;
  }
  #pill.pinned:not(.expanded) #pinDot { opacity: 0; } /* esconde no compact */
  #pill.pinned.expanded #pinDot { opacity: 1; }

  /* Baseline compact (sempre renderizado, fade in/out via opacity) */
  #compact {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    height: 38px;
    opacity: 1;
    transition: opacity 120ms ease;
  }
  #pill.expanded #compact { opacity: 0; pointer-events: none; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px currentColor;
    flex-shrink: 0;
  }
  .dot.clean     { color: var(--green);  background: var(--green);  box-shadow: none; }
  .dot.dirty     { color: var(--yellow); background: var(--yellow); }
  .dot.dirty-ahead { color: var(--orange); background: var(--orange); }
  .dot.ahead     { color: var(--orange); background: var(--orange); }
  .dot.behind    { color: var(--blue);   background: var(--blue); }
  .dot.diverged  { color: var(--red);    background: var(--red); }
  .dot.busy      { color: var(--yellow); background: var(--yellow); opacity: 0.6; }
  .dot.error     { color: var(--red);    background: var(--red);    opacity: 0.7; }

  #countText {
    font-size: 14px;
    font-weight: 800;
    color: var(--orange);
    font-feature-settings: 'tnum';
    min-width: 14px;
  }
  #countText.clean { color: var(--text-dim); font-weight: 600; font-size: 13px; }

  #compact #labelText {
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  #gitIcon {
    width: 16px; height: 16px;
    opacity: 0.75;
    flex-shrink: 0;
  }

  /* Expanded panel */
  #expanded {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    transition: opacity 120ms ease 60ms; /* pequeno delay pra entrar depois do reshape */
  }
  #pill.expanded #expanded {
    opacity: 1;
    pointer-events: auto;
  }

  #hdr {
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .hdr-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .hdr-left .count { font-weight: 800; font-size: 14px; color: var(--orange); }
  .hdr-left .count.clean { color: var(--text-dim); font-weight: 600; }
  .hdr-left .label {
    font-size: 11px;
    color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .hdr-actions { display: flex; align-items: center; gap: 4px; }

  .hdr-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 150ms ease, color 150ms ease;
    padding: 0;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .hdr-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* Scrollable list */
  #list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 10px 12px;
  }
  #list::-webkit-scrollbar { width: 6px; }
  #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  #list::-webkit-scrollbar-track { background: transparent; }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    transition: background 150ms ease;
    min-height: 32px;
  }
  .row:hover { background: rgba(255,255,255,0.06); }
  .row .name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 140px;
  }
  .row .detail {
    font-size: 10.5px;
    color: var(--text-dim);
    font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row .actions {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    cursor: pointer;
    height: 22px;
    padding: 0 8px;
    border-radius: 5px;
    font-size: 10.5px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn.icon {
    width: 24px; padding: 0;
    font-size: 12px;
  }
  .btn.push {
    color: var(--orange);
    border-color: rgba(219,109,40,0.4);
  }
  .btn.push:hover { background: rgba(219,109,40,0.12); }
  .btn.pull {
    color: var(--purple);
    border-color: rgba(163,113,247,0.4);
  }
  .btn.pull:hover { background: rgba(163,113,247,0.12); }
  .btn.running {
    color: var(--yellow);
    border-color: rgba(210,153,34,0.4);
    pointer-events: none;
  }
  .btn.running .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .icon-spin { animation: spin 1s linear infinite; transform-origin: center; transform-box: fill-box; }
  .btn.done {
    color: var(--green);
    border-color: rgba(63,185,80,0.4);
  }
  .btn.fail {
    color: var(--red);
    border-color: rgba(248,81,73,0.4);
  }

  #empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-dim);
    font-size: 11px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="pill">
    <div id="pinDot"></div>

    <!-- Baseline compact -->
    <div id="compact">
      <span class="dot clean" id="dotCompact"></span>
      <span id="countText" class="clean">0</span>
      <span id="labelText">Tudo sincronizado</span>
      <svg id="gitIcon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="#e6edf3">
        <path d="M15.698 7.287 8.712.302a1.03 1.03 0 0 0-1.457 0l-1.45 1.45 1.84 1.84a1.223 1.223 0 0 1 1.55 1.56l1.773 1.774a1.223 1.223 0 0 1 1.267 2.025 1.226 1.226 0 0 1-2.002-1.334L8.587 5.918v4.362a1.226 1.226 0 1 1-1.008-.036V5.844a1.226 1.226 0 0 1-.666-1.608L5.1 2.42.301 7.22a1.03 1.03 0 0 0 0 1.457l6.986 6.986a1.03 1.03 0 0 0 1.457 0l6.954-6.954a1.031 1.031 0 0 0 0-1.422"/>
      </svg>
    </div>

    <!-- Expanded panel -->
    <div id="expanded">
      <div id="hdr">
        <div class="hdr-left">
          <span class="dot clean" id="dotHdr"></span>
          <span class="count clean" id="countHdr">0</span>
          <span class="label" id="labelHdr">Tudo sincronizado</span>
        </div>
        <div class="hdr-actions">
          <button class="hdr-btn" id="btnPushAll" title="Push All"></button>
          <button class="hdr-btn" id="btnCfg" title="Configurações"></button>
          <button class="hdr-btn" id="btnFloat" title="Abrir widget flutuante"></button>
          <button class="hdr-btn" id="btnMin" title="Minimizar (Ctrl+Shift+H)"></button>
        </div>
      </div>
      <div id="list">
        <div id="empty" style="display:none;">Nenhum repositório configurado.</div>
      </div>
    </div>
  </div>
</div>

<script>
  const { ipcRenderer } = require('electron');

  const ICONS = {
    'refresh-cw':   '<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>',
    'settings':     '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
    'minus':        '<path d="M5 12h14"/>',
    'x':            '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    'check':        '<path d="M20 6 9 17l-5-5"/>',
    'alert':        '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    'arrow-up':     '<path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>',
    'arrow-down':   '<path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>',
    'folder':       '<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
    'app-window':   '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/>',
  };

  const _svgParser = new DOMParser();

  function icon(name, opts) {
    opts = opts || {};
    const size = opts.size || 16;
    const cls = opts.spin ? ' class="icon-spin"' : '';
    const xml = '<svg xmlns="http://www.w3.org/2000/svg"' + cls + ' width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + ICONS[name] + '</svg>';
    return _svgParser.parseFromString(xml, 'image/svg+xml').documentElement;
  }

  function setIcon(target, name, opts) {
    target.replaceChildren(icon(name, opts));
  }

  const pill = document.getElementById('pill');
  const compactEl = document.getElementById('compact');
  const expandedEl = document.getElementById('expanded');
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty');

  const dotCompact = document.getElementById('dotCompact');
  const countText = document.getElementById('countText');
  const labelText = document.getElementById('labelText');

  const dotHdr = document.getElementById('dotHdr');
  const countHdr = document.getElementById('countHdr');
  const labelHdr = document.getElementById('labelHdr');

  const btnPushAll = document.getElementById('btnPushAll');
  const btnCfg = document.getElementById('btnCfg');
  const btnFloat = document.getElementById('btnFloat');
  const btnMin = document.getElementById('btnMin');

  // Ícones dos botões
  setIcon(btnPushAll, 'arrow-up', { size: 14 });
  setIcon(btnCfg, 'settings', { size: 14 });
  setIcon(btnFloat, 'app-window', { size: 14 });
  setIcon(btnMin, 'minus', { size: 14 });

  const CLOSE_DELAY_MS = 300;
  const RIGHT_MARGIN = 0; // pill colado na borda direita da window

  let repos = [];
  let loaded = false;
  let hovered = false;
  let pinned = false;
  let minimized = false;
  let leaveTimer = null;
  let pollTimer = null;
  const runningActions = new Set();

  function makeEl(tag, props, children) {
    const el = document.createElement(tag);
    if (props) Object.entries(props).forEach(([k, v]) => {
      if (k === 'className') el.className = v;
      else if (k === 'textContent') el.textContent = v;
      else if (k === 'dataset') Object.entries(v).forEach(([dk, dv]) => { el.dataset[dk] = dv; });
      else if (k === 'title') el.title = v;
      else el.setAttribute(k, v);
    });
    if (children) children.forEach(c => { if (c) el.appendChild(c); });
    return el;
  }

  const STATUS_ORDER = {
    diverged: 0, behind: 1, ahead: 2, 'dirty-ahead': 3,
    dirty: 4, busy: 5, error: 6, clean: 7
  };

  function dominantStatus(list) {
    if (!list.length) return 'clean';
    return [...list].sort((a, b) =>
      (STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99)
    )[0].status;
  }

  function isPendingList() {
    return repos.some(r => r.pending);
  }
  function hasDiverged() {
    return repos.some(r => r.status === 'diverged');
  }
  function pendingCount() {
    return repos.filter(r => r.pending).length;
  }

  function isExpanded() {
    return !minimized && (hovered || pinned || isPendingList());
  }

  function updateSummary() {
    const total = repos.length;
    const nPending = pendingCount();
    const hasPending = nPending > 0;
    const dom = hasPending ? dominantStatus(repos.filter(r => r.pending)) : 'clean';

    const statusClass = 'dot ' + dom;
    dotCompact.className = statusClass;
    dotHdr.className = statusClass;

    if (hasPending) {
      countText.className = '';
      countHdr.className = 'count';
      countText.textContent = String(nPending);
      countHdr.textContent = String(nPending);

      const verb = {
        dirty: 'commit pendente',
        'dirty-ahead': 'commit+push',
        ahead: 'push pendente',
        behind: 'pull pendente',
        diverged: 'diverged'
      }[dom] || 'pendente';

      const first = repos.find(r => r.pending);
      const label = nPending === 1
        ? (first.name + ' — ' + verb)
        : (nPending + ' repos — ' + verb);
      labelText.textContent = label;
      labelHdr.textContent = label;
    } else {
      countText.className = 'clean';
      countHdr.className = 'count clean';
      setIcon(countText, 'check', { size: 12 });
      setIcon(countHdr, 'check', { size: 12 });
      const label = total === 0 ? 'Sem repos' : (total + ' repos sincronizados');
      labelText.textContent = label;
      labelHdr.textContent = label;
    }
  }

  function renderRow(r) {
    const cls = r.status || 'clean';
    const isRunning = runningActions.has(r.path);

    const dot = makeEl('span', { className: 'dot ' + cls });
    const name = makeEl('span', { className: 'name', textContent: r.name || '(sem nome)', title: r.path || '' });
    const detail = makeEl('span', { className: 'detail', textContent: r.detail || (r.status === 'clean' ? 'limpo' : '') });

    const actions = makeEl('div', { className: 'actions' });

    const folderBtn = makeEl('button', {
      className: 'btn icon',
      title: 'Abrir pasta',
      dataset: { act: 'folder', path: r.path || '' }
    });
    folderBtn.appendChild(icon('folder', { size: 12 }));
    folderBtn.addEventListener('click', onRowAction);
    actions.appendChild(folderBtn);

    const hasChanges = r.status === 'dirty' || r.status === 'dirty-ahead' || r.status === 'ahead';
    const needsPull  = r.status === 'behind';
    if (hasChanges || needsPull) {
      const isPull = needsPull;
      const actBtn = makeEl('button', {
        className: 'btn icon ' + (isPull ? 'pull' : 'push') + (isRunning ? ' running' : ''),
        title: isPull ? 'Pull' : 'Commit + push',
        dataset: {
          act: isPull ? 'pull' : 'push',
          path: r.path || '',
          name: r.name || ''
        }
      });
      if (isRunning) {
        actBtn.appendChild(icon('refresh-cw', { size: 12, spin: true }));
      } else {
        actBtn.appendChild(icon(isPull ? 'arrow-down' : 'arrow-up', { size: 12 }));
      }
      actBtn.addEventListener('click', onRowAction);
      actions.appendChild(actBtn);
    }

    return makeEl('div', { className: 'row' }, [dot, name, detail, actions]);
  }

  function renderList() {
    listEl.replaceChildren(emptyEl);
    if (repos.length === 0) {
      emptyEl.style.display = '';
      emptyEl.textContent = loaded ? 'Nenhum repositório configurado.' : 'Carregando…';
      return;
    }
    emptyEl.style.display = 'none';
    repos.forEach(r => listEl.appendChild(renderRow(r)));
  }

  function measureExpandedHeight() {
    let contentH = 0;
    for (const child of listEl.children) {
      if (child.style.display !== 'none') contentH += child.offsetHeight;
    }
    const cs = getComputedStyle(listEl);
    contentH += parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    const total = 38 + Math.min(contentH, 320);
    return Math.min(Math.max(total, 60), 390);
  }

  function updateShape() {
    const exp = isExpanded();
    pill.classList.toggle('expanded', exp);
    pill.classList.toggle('minimized', minimized && !hovered);
    pill.classList.toggle('alert', isPendingList());
    pill.classList.toggle('critical', hasDiverged());
    pill.classList.toggle('pinned', pinned);

    if (exp) {
      // Mede depois que o DOM renderizou
      requestAnimationFrame(() => {
        const h = measureExpandedHeight();
        pill.style.setProperty('--expanded-h', h + 'px');
        notifyRect();
      });
    } else {
      notifyRect();
    }
  }

  function notifyRect() {
    const exp = isExpanded();
    const w = exp ? 420 : 260;
    let h = 38;
    if (exp) {
      const raw = parseFloat(
        getComputedStyle(pill).getPropertyValue('--expanded-h')
      );
      h = !isNaN(raw) && raw > 0 ? raw : 320;
    }
    const isMin = minimized && !hovered;
    const offsetY = isMin ? -34 : 0;
    ipcRenderer.send('notch-rect', { w, h, offsetY, hotzone: null, right: RIGHT_MARGIN });
  }

  // ------ Interações ------

  pill.addEventListener('mouseenter', () => {
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    pill.classList.remove('closing');
    hovered = true;
    updateShape();
  });

  pill.addEventListener('mouseleave', () => {
    if (leaveTimer) clearTimeout(leaveTimer);
    leaveTimer = setTimeout(() => {
      leaveTimer = null;
      hovered = false;
      pill.classList.add('closing');
      setTimeout(() => pill.classList.remove('closing'), 320);
      updateShape();
    }, CLOSE_DELAY_MS);
  });

  pill.addEventListener('click', (ev) => {
    // Ignora clicks em botões internos (eles têm stopPropagation nos seus handlers)
    if (ev.target.closest('.hdr-btn, .btn')) return;
    if (minimized) {
      minimized = false;
    } else {
      pinned = !pinned;
    }
    updateShape();
  });

  btnCfg.addEventListener('click', (ev) => {
    ev.stopPropagation();
    ipcRenderer.invoke('open-config-window');
  });

  btnFloat.addEventListener('click', async (ev) => {
    ev.stopPropagation();
    await ipcRenderer.invoke('set-widget-mode', 'floating');
  });

  btnPushAll.addEventListener('click', async (ev) => {
    ev.stopPropagation();
    const pushable = repos.filter(r =>
      r.status === 'dirty' || r.status === 'dirty-ahead' || r.status === 'ahead'
    );
    if (pushable.length === 0) return;
    btnPushAll.disabled = true;
    setIcon(btnPushAll, 'refresh-cw', { size: 14, spin: true });
    for (const r of pushable) {
      runningActions.add(r.path);
      renderList();
      try {
        const res = await ipcRenderer.invoke('commit-and-push', r.path);
        markRowResult(r.path, res && res.ok ? 'done' : 'fail', (res && res.error) || '');
      } catch (e) {
        markRowResult(r.path, 'fail', e.message || String(e));
      }
      runningActions.delete(r.path);
    }
    setIcon(btnPushAll, 'check', { size: 14 });
    setTimeout(() => {
      setIcon(btnPushAll, 'arrow-up', { size: 14 });
      btnPushAll.disabled = false;
      refresh();
    }, 3000);
  });

  btnMin.addEventListener('click', (ev) => {
    ev.stopPropagation();
    minimized = true;
    pinned = false;
    hovered = false;
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    updateShape();
  });

  // Ctrl+Shift+H (via global shortcut no main) — toggle
  ipcRenderer.on('notch-toggle-minimize', () => {
    minimized = !minimized;
    if (minimized) { pinned = false; hovered = false; }
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    updateShape();
  });

  async function onRowAction(ev) {
    ev.stopPropagation();
    const btn = ev.currentTarget;
    const act = btn.dataset.act;
    const p = btn.dataset.path;
    if (!p) return;

    if (act === 'folder') {
      ipcRenderer.invoke('open-folder', p);
      return;
    }
    if (act === 'push' || act === 'pull') {
      runningActions.add(p);
      renderList();
      let ok = false, errMsg = '';
      try {
        const channel = act === 'push' ? 'commit-and-push' : 'git-pull';
        const res = await ipcRenderer.invoke(channel, p);
        ok = !!(res && res.ok);
        errMsg = (res && res.error) || '';
      } catch (e) {
        ok = false;
        errMsg = e.message || String(e);
      }
      runningActions.delete(p);
      markRowResult(p, ok ? 'done' : 'fail', errMsg);
      setTimeout(() => refresh(), 900);
    }
  }

  function markRowResult(repoPath, kind, detail) {
    listEl.querySelectorAll('button.btn').forEach(btn => {
      if (btn.dataset.path !== repoPath) return;
      const act = btn.dataset.act;
      if (act !== 'push' && act !== 'pull') return;
      btn.classList.remove('running');
      btn.classList.add(kind);
      btn.replaceChildren(icon(kind === 'done' ? 'check' : 'x', { size: 12 }));
      if (detail) btn.title = detail;
    });
  }

  async function refresh() {
    try {
      const res = await ipcRenderer.invoke('notch-all-repos');
      repos = (res && res.repos) || [];
      renderList();
      updateSummary();
      updateShape();
    } catch (e) {
      console.warn('[notch] refresh falhou:', e);
    } finally {
      loaded = true;
    }
  }

  async function startPolling() {
    try {
      const cfg = (await ipcRenderer.invoke('get-config')) || {};
      const seconds = Math.max(10, cfg.intervalSeconds || 30);
      refresh();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(refresh, seconds * 1000);
    } catch (e) {
      console.warn('[notch] startPolling falhou:', e);
      setTimeout(startPolling, 2000);
    }
  }

  ipcRenderer.on('config-saved', () => startPolling());

  // Inicial: notifica rect baseline pro passthrough do main
  updateShape();
  startPolling();
</script>
</body>
</html>
